name: Ruff

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Run Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Run Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check
