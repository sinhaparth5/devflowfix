worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30;
    keepalive_requests 1000;
    client_max_body_size 10m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;
    reset_timedout_connection on;
    ignore_invalid_headers on;

    map $http_cf_connecting_ip $client_ip_from_cf {
        default $http_cf_connecting_ip;
        "" "";
    }

    map $http_x_forwarded_for $client_ip_from_xff {
        "~^(?<first>[^, ]+)" $first;
        default "";
    }

    map "$client_ip_from_cf:$client_ip_from_xff" $resolved_client_ip {
        "~^(?<cf>[^:]+):" $cf;
        "~^:(?<xff>[^:]+)$" $xff;
        default $remote_addr;
    }

    log_format devflowfix_proxy escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"resolved_client_ip":"$resolved_client_ip",'
            '"cf_connecting_ip":"$http_cf_connecting_ip",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"x_real_ip":"$http_x_real_ip",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"cf_ray":"$http_cf_ray"'
        '}';

    upstream backend_app {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 8000;
        server_name _;

        access_log /dev/stdout devflowfix_proxy;
        error_log /dev/stderr warn;

        location = /health {
            access_log off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $resolved_client_ip;
            proxy_set_header X-Forwarded-For $resolved_client_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Original-Forwarded-For $http_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_pass http://backend_app;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $resolved_client_ip;
            proxy_set_header X-Forwarded-For $resolved_client_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Original-Forwarded-For $http_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Request-Start "t=${msec}";
            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_busy_buffers_size 32k;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_pass http://backend_app;
        }
    }
}
